<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff9"/>
      <stop offset="50%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="15" fill="#0a0a1a"/>
  <text x="50" y="62" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="url(#neonGradient)" text-anchor="middle" filter="url(#glow)">SF</text>
  <rect x="5" y="5" width="90" height="90" rx="12" fill="none" stroke="url(#neonGradient)" stroke-width="2" opacity="0.5"/>
</svg>
